<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Memo — บริษัท ไทยซอสเซส มาร์เก็ตติ้ง จำกัด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { font-family: 'Noto Sans Thai', 'Sarabun', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <style>
      /* Prevent accidental horizontal overflow and provide a small utility for wrapping long words */
      html, body { max-width: 100%; overflow-x: hidden; }
      .wrap-word { word-break: break-word; overflow-wrap: anywhere; }
      /* Ensure buttons and selects don't force larger width than their containers */
      button, select, input, textarea { max-width: 100%; box-sizing: border-box; }
      /* Responsive two-column layout used in CreateView */
      .two-col { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
      @media (max-width: 880px) { .two-col { grid-template-columns: 1fr; } }
    </style>
  </body>
</html>
